
services:
  db:
    image: postgres:17
    container_name: complianceai-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: compliance_ai

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: complianceai-api

    depends_on:
      - db

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
    - .:/app

    command: ./entrypoint.sh

volumes:
  postgres_data: